# skills/alva/references/design-contract.yaml
# Machine-readable contract for the Alva playbook design system.
# Source of truth for the design linter shipped in @alva-ai/toolkit.
# Keep this in sync with the design docs and generated CSS bundle.

version: 1
description: |
  Alva playbook design system contract — global structural rules + the
  registered component class registry used by the design linter.

global:
  required-container:
    selector: ".playbook-container"
    must-exist: true
  required-stylesheets:
    - any-of:
        - url: "https://alva-ai-static.b-cdn.net/design-system/design-tokens.css"
        - url: "https://alva-ai-static.b-cdn.net/design-system/v1/design-system.css"
  canonical-css-urls:
    - "https://alva-ai-static.b-cdn.net/design-system/v1/design-system.css"
  scroll:
    sole-scroll-container: ["body", "html"]
  typography:
    font-family-root-must-include: "Delight"
    font-weight-allowed: [400, 500]
    # design.md §Typography: ≥24px must be Regular(400) only
    font-weight-restrictions:
      - min-font-size-px: 24
        allowed: [400]
  links:
    anchor-required-attrs: ["target", "rel"]
    # design.md §Links: rel must contain noopener noreferrer
    rel-must-contain: ["noopener", "noreferrer"]
  # design.md §Typography → Anti-aliasing Standards
  anti-aliasing:
    required-declarations:
      - "-webkit-font-smoothing: antialiased"
      - "-moz-osx-font-smoothing: grayscale"
      - "text-rendering: optimizeLegibility"

  # Cross-cutting script rules (not scoped to any component). Same matcher
  # shape as a component's required-scripts.
  required-scripts:
    # Any page using ECharts must defer init/resize so a 0-width or
    # display:none container at first render doesn't compress the canvas.
    # The tab-resize requirement under components.tab covers tab-switch
    # specifically; this covers the no-tab case.
    - when-script-contains: ["echarts.init"]
      must-contain: ["requestAnimationFrame"]
      message: "Pages using ECharts must defer init/resize via requestAnimationFrame — otherwise a 0-width or display:none container at first render compresses the canvas."

components:
  dropdown:
    root: "dropdown"
    children:
      - "dropdown-border"
      - "list-item"
      - "list-item-inner"
      - "list-item-text"
    states:
      - "selected"

  markdown:
    root: "markdown-container"
    sizes:
      - "markdown-container--l"
      - "markdown-container--s"

  button:
    root: "btn"
    variants:
      - "btn-primary"
      - "btn-secondary"
    sizes:
      - "btn-large"
      - "btn-medium"
      - "btn-small"
      - "btn-extra-small"
    states:
      - "btn-disabled"
      - "btn-loading"
    bindings:
      - selector: "button"
        require-class: "btn"

  tag:
    root: "tag"
    sizes:
      - "tag-md"
      - "tag-xs"

  switch:
    root: "switch"
    sizes:
      - "switch-sm"
      - "switch-lg"
    states:
      - "on"
      - "disabled"
    children:
      - "switch-thumb"

  modal:
    root: "modal-close"

  select:
    root: "select"
    sizes:
      - "select-lg"
      - "select-sm"
    states:
      - "filled"
      - "open"
    children:
      - "select-border"
      - "select-text"
      - "select-icon"

  input:
    root: "input"
    sizes:
      - "input-lg"
      - "input-sm"
    children:
      - "input-border"
      - "input-field"

  tab:
    root: "tab"
    variants:
      - "tab-underline"
      - "tab-segmented"
      - "tab-pill"
    sizes:
      - "tab-l"
      - "tab-s"
    states:
      - "active"
    children:
      - "tab-item"
    required-scripts:
      # Canonical path: chart-card component used → check resize handler.
      - when-also: ["chart-card"]
        must-contain:
          - "[_echarts_instance_]"
          - "echarts.getInstanceByDom"
          - ".resize()"
        message: "Hidden ECharts containers report 0×0; when a tab panel becomes visible, resize all ECharts instances inside it. See design-components.md §Tab JS Interaction."
      # Semantic-trigger path: any tab playbook that calls echarts.init
      # — regardless of whether the chart wrapper uses canonical .chart-container
      # class. Catches playbooks that style charts with ad-hoc wrapper classes
      # but still need the same resize-on-tab-switch handler.
      - when-script-contains: ["echarts.init"]
        must-contain:
          - "[_echarts_instance_]"
          - "echarts.getInstanceByDom"
          - ".resize()"
        message: "ECharts is in use anywhere in this tab playbook; the canonical resize-on-tab-switch handler is required regardless of which class wraps the chart. See design-components.md §Tab JS Interaction."
      - when-also: ["table-card"]
        must-contain:
          - "initTableAlignment"
        message: "Re-align table-card columns when a tab panel becomes visible. See design-components.md §Tab JS Interaction."

  tooltip:
    root: "tooltip"
    children:
      - "tooltip-border"
      - "tooltip-text"
      - "tooltip-title"

  # ── Chart Card (design-widgets.md §Chart Card) ────────────────────────────
  # Kept because tab.required-scripts references chart-card via when-also.
  chart-card:
    root: "chart-container"
    children:
      - "chart-body"
      - "chart-legend"
      - "chart-dotted-background"

  # ── Table Card (design-widgets.md §Table Card) ────────────────────────────
  # Kept because tab.required-scripts references table-card via when-also.
  table-card:
    root: "table-card"
    children:
      - "table-row"
      - "table-cell"
    states:
      - "is-bullish"
      - "is-bearish"

  # ── Feed Card (design-widgets.md §Feed Card) ──────────────────────────────
  feed-card:
    root: "feed-body"
    children:
      - "feed-item"
      - "feed-item-main"
      - "feed-header"
      - "feed-header-meta"
      - "feed-avatar"
      - "feed-avatar-badge"
      - "feed-title"
      - "feed-display-name"
      - "feed-handle"
      - "feed-meta-date"
      - "feed-meta-sep"
      - "feed-content"
      - "feed-post-title"
      - "feed-text"
      - "feed-info"
      - "feed-actions"
      - "feed-action"
      - "feed-action-icon"
      - "feed-thumb"
      - "feed-thumb-play"
    states:
      - "has-badge"
      - "no-radius"
